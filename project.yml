name: LittleGuy
options:
  bundleIdPrefix: com.sleimanzublidi.littleguy
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: NO
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:

  LittleGuy:
    type: application
    platform: macOS
    sources:
      - path: LittleGuy
        excludes:
          - "Resources/Pets"
      - path: LittleGuy/Resources/Pets
        type: folder
    info:
      path: LittleGuy/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: LittleGuy
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sleimanzublidi.littleguy.LittleGuy
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES

  LittleGuyNotify:
    type: tool
    platform: macOS
    sources:
      - LittleGuyNotify
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sleimanzublidi.littleguy.LittleGuyNotify

  LittleGuyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LittleGuyTests
        excludes:
          - "Fixtures"
      - path: LittleGuyTests/Fixtures
        type: folder
    dependencies:
      - target: LittleGuy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LittleGuy.app/Contents/MacOS/LittleGuy"
