name: LittleGuy
options:
  bundleIdPrefix: com.sleimanzublidi.littleguy
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: NO
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:

  LittleGuy:
    type: application
    platform: macOS
    sources:
      - path: LittleGuy
        excludes:
          - "Resources/Pets"
          - "Resources/AppIcons/AppIcon*.png"
      - path: LittleGuy/Resources/Pets
        type: folder
    info:
      path: LittleGuy/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: LittleGuy
        CFBundleIconFile: AppIcon
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sleimanzublidi.littleguy.LittleGuy
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES

  LittleGuyNotify:
    type: tool
    platform: macOS
    sources:
      - LittleGuyNotify
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sleimanzublidi.littleguy.LittleGuyNotify

  LittleGuyTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LittleGuyTests
        excludes:
          - "Fixtures"
      - path: LittleGuyTests/Fixtures
        type: folder
    dependencies:
      - target: LittleGuy
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LittleGuy.app/Contents/MacOS/LittleGuy"

# Defining `schemes:` disables xcodegen's per-target auto-gen, so all
# schemes we want must be listed here explicitly. The "Debug Grid" variant
# launches the app with `LITTLEGUY_DEBUG_GRID=1` so the floating tank
# renders every PetState in a grid for visual validation.
schemes:
  LittleGuy:
    build:
      targets:
        LittleGuy: all
        LittleGuyTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LittleGuyTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  LittleGuy (Debug Grid):
    build:
      targets:
        LittleGuy: all
        LittleGuyTests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: LITTLEGUY_DEBUG_GRID
          value: "1"
          isEnabled: true
    test:
      config: Debug
      targets:
        - LittleGuyTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  LittleGuyNotify:
    build:
      targets:
        LittleGuyNotify: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
