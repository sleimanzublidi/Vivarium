# Self-improvement workflow — generates product and engineering ideas, debates them,
# starts a git worktree, implements the best qualifying task there, validates
# the binary, runs a review-fix loop, and commits any remaining changes.
#
# Usage:
#   orc start self-improve
#   orc start self-improve --input agent="copilot"
#   orc start self-improve --input review_iterations="5"
#   orc start self-improve --input build_command="bash Scripts/build" --input validate_command="bash Scripts/validate"
name: self-improve
description: Autonomous self-improvement cycle that generates product and engineering ideas, debates and ranks them, creates an isolated git worktree for the top qualifying pick, validates the tool, runs iterative code review, and commits any remaining changes.

input:
  - name: agent
    type: string
    default: "claude-code"
  - name: idea_count
    type: string
    default: "3"
  - name: review_iterations
    type: string
    default: "3"
  - name: build_command
    type: string
    default: "bash Scripts/build.sh --debug"
  - name: validate_command
    type: string
    default: "bash Scripts/validate.sh"

nodes:
  - id: setup
    command: |
      set -eu
      TIMESTAMP="$(date '+%Y%m%d-%H%M%S')"
      mkdir -p {{orc_root}}/self-improve
      if [ ! -f "{{orc_root}}/self-improve/ideas-backlog.md" ]; then
        cat > "{{orc_root}}/self-improve/ideas-backlog.md" <<'EOF'
      # Ideas Backlog

      Ideas are ranked by the self-improve reviewer. Selected or completed ideas are removed; unresolved high-value ideas stay eligible for future runs.

      ## Scoring Guide

      Each idea is scored from 1 to 5 on:
      - **Value:** user-facing product impact or ability to unblock high-value user-facing work.
      - **Feasibility:** confidence that the self-improve workflow can implement and validate the idea autonomously in one run.
      - **Safety:** likelihood the change can be made without regressions.

      The composite score is `2 × Value + Feasibility + Safety`, with a maximum of 20. Value is double-weighted because user-facing impact is the primary driver; feasibility and safety act as gates.

      Backlog retention rule: keep an idea only if `Value >= 3`, `Safety >= 3`, and either `Feasibility >= 3` or the idea is explicitly marked as strategic/unblocking in its notes. Remove low-value, unsafe, speculative, obsolete, duplicate, or already-implemented ideas.
      EOF
      fi
      printf '%s\n' "$TIMESTAMP"
    output: timestamp

  - id: create-worktree
    command: |
      set -eu
      BRANCH="self-improve/{{timestamp}}"
      REPO_NAME="$(basename "{{repo_root}}")"
      WORKTREE="$(dirname "{{repo_root}}")/${REPO_NAME}-self-improve-{{timestamp}}"
      # Redirect git's stdout ("HEAD is now at <sha> <subject>") to stderr
      # so that the only thing this node emits on stdout is the worktree
      # path captured by output: worktree_path.
      git worktree add -b "$BRANCH" "$WORKTREE" HEAD >&2
      mkdir -p "$WORKTREE/.orc/self-improve"
      cp -R "{{orc_root}}/self-improve/." "$WORKTREE/.orc/self-improve/"
      printf '%s\n' "$WORKTREE"
    depends_on: setup
    output: worktree_path

  - id: codebase-summary
    agent: "{{agent}}"
    depends_on: create-worktree
    prompt_file: "{{orc_root}}/prompts/codebase-summary.md"
    parameters:
      permission_mode: bypassPermissions
    output: codebase_summary

  - id: product-manager
    agent: "{{agent}}"
    depends_on: codebase-summary
    prompt_file: "{{orc_root}}/prompts/product-manager.md"
    parameters:
      permission_mode: bypassPermissions
    output: product_ideas_file

  - id: principal-engineer
    agent: "{{agent}}"
    depends_on: codebase-summary
    prompt_file: "{{orc_root}}/prompts/principal-engineer.md"
    parameters:
      permission_mode: bypassPermissions
    output: engineer_ideas_file

  - id: adversarial-reviewer
    agent: "{{agent}}"
    depends_on:
      - product-manager
      - principal-engineer
    prompt_file: "{{orc_root}}/prompts/adversarial-reviewer.md"
    parameters:
      permission_mode: bypassPermissions
    output: reviewer_output

  # Deterministic path to the tasks file written by adversarial-reviewer.
  # Captured here (not from the agent's stdout) to avoid downstream nodes
  # interpolating prose that contains backticks/paths into shell commands.
  - id: tasks-file
    agent: shell
    depends_on: adversarial-reviewer
    command: 'printf "%s/.orc/self-improve/%s-tasks.md" "{{worktree_path}}" "{{timestamp}}"'
    output: tasks_file

  - id: software-engineer
    workflow: .orc/workflows/implement-task.yaml
    depends_on: task-decision
    when: "{{task_decision}} == 'IMPLEMENT'"
    on_failure: continue
    inputs:
      task_file: "{{tasks_file}}"
      worktree_path: "{{worktree_path}}"
      agent: "{{agent}}"

  - id: tool-validation
    workflow: .orc/workflows/tool-validation.yaml
    depends_on: software-engineer
    when: "{{software-engineer.status}} == 'completed'"
    inputs:
      worktree_path: "{{worktree_path}}"
      agent: "{{agent}}"
      validation_report: "{{worktree_path}}/.orc/self-improve/{{timestamp}}-validation.md"
      build_command: "{{build_command}}"
      validate_command: "{{validate_command}}"

  - id: fix-loop
    workflow: .orc/workflows/fix-loop.yaml
    depends_on: tool-validation
    when: "{{tool-validation.status}} == 'completed'"
    inputs:
      max_iterations: "{{review_iterations}}"
      worktree_path: "{{worktree_path}}"
      review_dir: "{{worktree_path}}/.orc/self-improve"
      agent: "{{agent}}"

  # Renders the Selected Task block from the task file into a commit message
  # — what was implemented, the scores, and the rationale. Does NOT describe
  # the diff (use `git show` for that). Runs only on the IMPLEMENT path; for
  # NOOP the commit node uses a fixed body. Failures here are non-fatal --
  # the commit node falls back to a generic body.
  - id: commit-message
    agent: "{{agent}}"
    depends_on:
      - task-decision
      - fix-loop
    when: "{{task_decision}} == 'IMPLEMENT' && {{fix-loop.status}} == 'completed'"
    on_failure: continue
    parameters:
      permission_mode: bypassPermissions
    prompt: |
      Write a git commit message for the implementation completed in the worktree at `{{worktree_path}}`.

      Source of truth is the **Selected Task** section of the task file (do NOT inspect the diff or describe per-file changes):
      - {{tasks_file}}

      From that section, extract: title, source, priority, scores (Value, Feasibility, Safety, Composite), description, and rationale. Use the wording from the task file verbatim where possible — light cleanup is fine, but do not invent details.

      Write the message to `{{worktree_path}}/.orc/self-improve/{{timestamp}}-commit.txt` with exactly this structure:

      ```
      <one-line subject under 72 chars: the task title, phrased as what was implemented. Do NOT include any "[Self-improve: ...]" prefix — the workflow prepends that.>

      **Source:** <copy from task file, e.g. "Backlog #1" / "Product Ideas #2" / "Engineering Ideas #3">
      **Priority:** <P0/P1/P2 from task file>
      **Score:** Value <V> · Feasibility <F> · Safety <S> · Composite <C>

      **Description**
      <Description from the task file, verbatim or lightly tightened. Multi-line is fine.>

      **Rationale**
      <Rationale from the task file, verbatim or lightly tightened. Multi-line is fine.>

      **Validation:** Build, smoke validation, and multi-agent code review passed.
      ```

      Do not include per-file change lists, diffstats, or descriptions of what changed where — `git show` already shows that. Output ONLY the absolute path of the saved file.
    output: commit_message_file

  - id: commit
    agent: shell
    depends_on:
      - task-decision
      - fix-loop
      - commit-message
    when: "{{task_decision}} == 'NOOP' || {{fix-loop.status}} == 'completed'"
    command: |
      set -eu
      TIMESTAMP="{{timestamp}}"
      MESSAGE_FILE="{{worktree_path}}/.orc/self-improve/${TIMESTAMP}-commit.txt"
      git -C "{{worktree_path}}" add -A
      if git -C "{{worktree_path}}" diff --cached --quiet; then
        echo "No changes to commit."
      else
        if [ "{{task_decision}}" = "NOOP" ]; then
          git -C "{{worktree_path}}" commit \
            -m "[Self-improve: ${TIMESTAMP}]" \
            -m "Automated self-improvement cycle — no implementation task cleared the selection bar."
        elif [ -s "$MESSAGE_FILE" ]; then
          # Prepend the [Self-improve: <timestamp>] tag to the agent-written
          # subject so log filters on that prefix keep working.
          SUBJECT_LINE="$(head -n 1 "$MESSAGE_FILE")"
          FULL_MESSAGE_FILE="$(mktemp)"
          {
            printf '[Self-improve: %s] %s\n' "$TIMESTAMP" "$SUBJECT_LINE"
            tail -n +2 "$MESSAGE_FILE"
          } > "$FULL_MESSAGE_FILE"
          git -C "{{worktree_path}}" commit -F "$FULL_MESSAGE_FILE"
          rm -f "$FULL_MESSAGE_FILE"
        else
          # Fallback when commit-message agent failed or produced nothing.
          git -C "{{worktree_path}}" commit \
            -m "[Self-improve: ${TIMESTAMP}]" \
            -m "Automated self-improvement cycle — implementation validated and reviewed."
        fi
      fi
    output: commit_result

  - id: task-decision
    agent: shell
    depends_on: tasks-file
    command: |
      if grep -Eq '^\*\*Decision:\*\* NOOP[[:space:]]*$' "{{tasks_file}}"; then
        printf 'NOOP'
      else
        printf 'IMPLEMENT'
      fi
    output: task_decision

  # Remove the temporary worktree once everything is committed. The branch is
  # preserved -- only the working-tree directory is deleted. We gate on commit
  # success so a failed run leaves the worktree in place for inspection.
  - id: cleanup-worktree
    agent: shell
    depends_on: commit
    when: "{{commit.status}} == 'completed'"
    command: |
      set -eu
      BRANCH="self-improve/{{timestamp}}"
      # --force tolerates leftover gitignored files (logs, sqlite WAL, etc.)
      # that would otherwise block removal. All tracked changes are already
      # committed by this point.
      git -C "{{repo_root}}" worktree remove --force "{{worktree_path}}"
      echo "Worktree removed. Branch '$BRANCH' retained:"
      git -C "{{repo_root}}" rev-parse --short "$BRANCH"
    output: cleanup_result

output:
  product_ideas: "{{product_ideas_file}}"
  engineer_ideas: "{{engineer_ideas_file}}"
  tasks: "{{tasks_file}}"
  decision: "{{task_decision}}"
  branch: "self-improve/{{timestamp}}"
  implementation: "{{software-engineer.output | default: SKIPPED}}"
  validation: "{{tool-validation.output | default: SKIPPED}}"
  review: "{{fix-loop.output | default: SKIPPED}}"
  commit_message: "{{commit_message_file | default: SKIPPED}}"
  commit: "{{commit_result | default: SKIPPED}}"
  cleanup: "{{cleanup_result | default: SKIPPED}}"
